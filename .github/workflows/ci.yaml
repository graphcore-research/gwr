name: CI

on:
  push:
    branches-ignore:
      - "pr-**"
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  warm-build-deps-cache:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/install-build-dependencies

  warm-dev-deps-cache:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    needs: warm-build-deps-cache

    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/install-dev-dependencies

  lint:
    runs-on: macos-latest
    needs: warm-dev-deps-cache
    env:
      RUSTFLAGS: -D warnings

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - uses: actions/cache@v5
        with:
          path: .lycheecache
          key: lycheecache-${{ hashFiles('lychee.toml') }}
      - uses: ./.github/actions/install-dev-dependencies

      - name: Lint with pre-commit
        run: pre-commit run --all-files --show-diff-on-failure

  check-semantic-versioning:
    runs-on: ubuntu-latest
    needs: warm-dev-deps-cache

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Required to cause the main branch to also be fetched
          submodules: true
      - uses: ./.github/actions/install-dev-dependencies
      - run: pre-commit run --hook-stage manual --all-files cargo-semver-checks

  build:
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    needs: warm-build-deps-cache
    env:
      RUSTFLAGS: -D warnings

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - uses: ./.github/actions/install-build-dependencies
      - uses: ./.github/actions/run-build-command
        with:
          command: cargo build --all-features --verbose
          cache-name: ${{ github.job }}

  test:
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    needs: warm-build-deps-cache
    env:
      RUSTFLAGS: -D warnings

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - uses: ./.github/actions/install-build-dependencies
      - uses: ./.github/actions/run-build-command
        with:
          command: cargo test --all-features --verbose
          cache-name: ${{ github.job }}
          paths: |
            target/
            gwr-developer-guide/doctest_cache/
            gwr-developer-guide/rustdoc_cache/

  benchmark:
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    needs: warm-build-deps-cache
    env:
      RUSTFLAGS: -D warnings
      BASELINE_BRANCH_NAME: main
      GH_TOKEN: ${{ github.token }}

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - uses: ./.github/actions/install-build-dependencies

      - name: Build all benchmarks
        id: build-all-benchmarks
        uses: ./.github/actions/run-build-command
        with:
          command: cargo bench --all-features --verbose --no-run
          cache-name: ${{ github.job }}

      - name: Get ID of latest successful benchmark run on baseline branch
        id: get-latest-successful-benchmark-run
        run: |
          id="$(
            gh run list \
              --workflow ${{ github.workflow }} \
              --branch ${{ env.BASELINE_BRANCH_NAME }} \
              --status success \
              --limit 1 \
              --json databaseId \
              --jq '.[0].databaseId'
          )"
          echo "id=$id" >> "$GITHUB_OUTPUT"

      - name: Download baseline benchmark results
        id: download-baseline-benchmark-results
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          name: one-shot-benchmark-baselines-${{ matrix.os }}
          path: target/gungraun/
          github-token: ${{ github.token }}
          run-id: ${{ steps.get-latest-successful-benchmark-run.outputs.id }}

      - name: Run one-shot benchmarks and update baseline results
        id: run-benchmarks-save-results
        if: github.ref == format('refs/heads/{0}', env.BASELINE_BRANCH_NAME)
        run: cargo bench --all-features --verbose --bench one_shot_benchmarks -- --save-baseline=$BASELINE_BRANCH_NAME

      - name: Upload baseline benchmark results
        id: upload-baseline-benchmark-results
        if: github.ref == format('refs/heads/{0}', env.BASELINE_BRANCH_NAME)
        uses: actions/upload-artifact@v7
        with:
          name: one-shot-benchmark-baselines-${{ matrix.os }}
          path: target/gungraun/
          overwrite: true

      - name: Run one-shot benchmarks
        id: run-benchmarks
        if: github.ref != format('refs/heads/{0}', env.BASELINE_BRANCH_NAME)
        run: cargo bench --all-features --verbose --bench one_shot_benchmarks -- --baseline=$BASELINE_BRANCH_NAME
