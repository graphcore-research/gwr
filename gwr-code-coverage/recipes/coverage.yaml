description:
  Run all workspace tests with code coverage enabled and generate an HTML
  coverage report, a source snapshot, and machine-readable summary.json and
  details.json files.
arguments:
  - name: REPORT_DIR
    default: target/llvm-cov/latest
    comment:
      Directory to write the generated HTML coverage report, source snapshot,
      and JSON outputs into.
  - name: EXTRA_ARGS
    default: ""
    comment: Additional arguments to append to `cargo llvm-cov`.
ingredients:
  - comment: Check that the `cargo llvm-cov` subcommand is available.
    command: |-
      if ! cargo llvm-cov --version >/dev/null 2>&1; then
        echo "cargo-llvm-cov is not installed."
        echo "Install it with: cargo binstall --disable-telemetry --no-confirm --locked cargo-llvm-cov"
        exit 1
      fi
  - comment: Ensure the output directory exists before generating the report.
    command: mkdir -p "$REPORT_DIR"
  - comment: Clear any existing coverage artefacts from previous runs.
    command: cargo llvm-cov clean --workspace
  - comment:
      Run the full workspace test suite with all features enabled and collect
      coverage data.
    command: |-
      cargo llvm-cov \
        --workspace \
        --all-features \
        --verbose \
        --no-report \
        $EXTRA_ARGS
  - comment:
      Generate the HTML coverage report, summary.json, and details.json from the
      collected data.
    command: |-
      cargo llvm-cov report \
        --html \
        --output-dir "$REPORT_DIR"
      cargo llvm-cov report \
        --json \
        --summary-only \
        --output-path "$REPORT_DIR/summary.json"
      cargo llvm-cov report \
        --json \
        --output-path "$REPORT_DIR/details.json"
  - comment:
      Snapshot the source files referenced by details.json so later diffs can
      compare against the source as it existed when coverage was collected.
    command: |-
      rm -rf "$REPORT_DIR/source-snapshot"
      cargo run --bin gather-files -- \
        "$REPORT_DIR/details.json" \
        "$REPORT_DIR/source-snapshot"
  - comment: Print the location of the generated coverage artefacts.
    command: |-
      echo "Coverage report generated in $REPORT_DIR/index.html"
      echo "Coverage summary generated in $REPORT_DIR/summary.json"
      echo "Coverage details generated in $REPORT_DIR/details.json"
      echo "Coverage source snapshot generated in $REPORT_DIR/source-snapshot"
