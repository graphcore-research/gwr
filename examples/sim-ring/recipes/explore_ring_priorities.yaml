description:
  Sweep sim-ring across multiple ring priorities while keeping logs and traces
  separate for each run so architecture exploration results are easy to compare.
arguments:
  - name: RING_PRIORITIES
    default: 1 10 100
    comment: Space-separated list of ring priorities to explore
  - name: RING_SIZE
    default: 8
    comment: Number of nodes in the ring
  - name: KIB_TO_SEND
    default: 1024
    comment: Traffic injected by each source in KiB
  - name: TX_BUFFER_KIB
    default: 32
    comment: Source-side transmit buffering in KiB
  - name: RX_BUFFER_KIB
    default: 32
    comment: Sink-side receive buffering in KiB
  - name: FRAME_PAYLOAD_BYTES
    default: 256
    comment: Payload bytes in each generated frame
  - name: MONITOR_WINDOW_TICKS
    default: 1000
    comment: Window size for monitor statistics
  - name: OUTPUT_DIR
    default: traces/explore-sim-ring
    comment: Folder used to store per-priority logs, traces, and summaries
ingredients:
  - comment: Show the chosen exploration parameters
    command:
      echo "sim-ring ring_size=${RING_SIZE} send=${KIB_TO_SEND}KiB
      priorities='${RING_PRIORITIES}' tx=${TX_BUFFER_KIB}KiB
      rx=${RX_BUFFER_KIB}KiB payload=${FRAME_PAYLOAD_BYTES}B
      output=${OUTPUT_DIR}"
  - comment: Create the output folder for all sweep artifacts
    command: mkdir -p ${OUTPUT_DIR}
  - comment:
      Run sim-ring once per requested priority, keep each log and trace
      separate, and continue even when a configuration fails
    command: |-
      priorities=(${(z)RING_PRIORITIES})
      for priority in ${priorities[@]}; do
        log_file="${OUTPUT_DIR}/sim-ring-priority-${priority}.log"
        trace_file="${OUTPUT_DIR}/sim-ring-priority-${priority}.pftrace"
        status_file="${OUTPUT_DIR}/sim-ring-priority-${priority}.status"
        echo "Running sim-ring with ring priority ${priority}"
        if cargo run --bin sim-ring --release -- --stdout --stdout-level info --progress \
          --ring-size ${RING_SIZE} --kib-to-send ${KIB_TO_SEND} \
          --ring-priority "${priority}" --tx-buffer-kib ${TX_BUFFER_KIB} \
          --rx-buffer-kib ${RX_BUFFER_KIB} \
          --frame-payload-bytes ${FRAME_PAYLOAD_BYTES} --monitor-window-ticks \
          ${MONITOR_WINDOW_TICKS} --perfetto --perfetto-file "${trace_file}" \
          > "${log_file}" 2>&1; then
          runtime_ns=$(sed -n 's/.*Pass (\([0-9.]*ns\)).*/\1/p' "${log_file}" | tail -n 1)
          if [ -n "${runtime_ns}" ]; then
            echo "PASS priority=${priority} runtime=${runtime_ns}" | tee "${status_file}"
          else
            echo "PASS priority=${priority} runtime=unknown" | tee "${status_file}"
          fi
        else
          echo "FAIL priority=${priority} (see ${log_file})" | tee "${status_file}"
        fi
      done
