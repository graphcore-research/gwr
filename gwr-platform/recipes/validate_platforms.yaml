description:
  Run the commands that ensure every gwr-platform example file still parses and
  builds into a valid platform.
arguments: []
ingredients:
  - comment: Validate every platform example in gwr-platform/examples.
    command: |-
      for platform in gwr-platform/examples/*.yaml; do
        cargo run --bin validate-platform -p gwr-platform -- --platform "${platform}"
      done
