memory_maps:
  - name: pe_memory_map
    devices:
      - name: mem0
  - name: coherency_memory_map
    devices:
      - name: mem0

processing_elements:
  - name: pe0
    memory_map: pe_memory_map
    config:
      lsu_access_bytes: 32
      sram_bytes: 64KiB

caches:
  - name: l1_0
    memory_map: pe_memory_map
    coherency_manager: cm0
    config:
      bw_bytes_per_cycle: 32
      line_size_bytes: 32
      delay_ticks: 4

coherency_managers:
  - name: cm0
    memory_map: coherency_memory_map
    config:
      line_size_bytes: 32

fabrics:
  - name: fabric0
    kind: functional
    columns: 2
    rows: 2
    port_devices:
      - port: (0,0)
        devices:
          - pe0
          - l1_0
      - port: (0,1)
        devices:
          - cm0
      - port: (1,0)
        devices:
          - mem0

memories:
  - name: mem0
    kind: ddr
    base_address: 0x1_0000_0000
    capacity_bytes: 1GiB
    delay_ticks: 40

connections:
  - connect:
      - pe.pe0
      - cache.l1_0.dev
  - connect:
      - cache.l1_0.mem
      - fabric.fabric0@(0,0)
  - connect:
      - coherency_manager.cm0
      - fabric.fabric0@(0,1)
  - connect:
      - mem.mem0
      - fabric.fabric0@(1,0)
  - connect:
      - null
      - fabric.fabric0@(1,1)
